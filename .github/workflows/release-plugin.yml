name: Release plugin

# Per-plugin, independently versioned releases. Tag a plugin as
# `<name>-v<version>` (e.g. `postgres-v1.0.0`, matching its Cargo.toml version)
# and this builds it natively for amd64 + arm64, publishes a GitHub Release with
# the archives + checksums + the published loadsmith-plugin.yaml, and updates the
# index.json that `loadsmith install` reads.

on:
  push:
    tags: ["*-v*"]

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.parse.outputs.name }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: parse
        run: |
          tag="${GITHUB_REF_NAME}"
          name="${tag%-v*}"          # strip -v<version> (plugin names have no '-v')
          version="${tag##*-v}"
          echo "name=$name"       >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          test -d "$name" || { echo "::error::no plugin dir '$name' for tag $tag"; exit 1; }
          python3 ci/release.py check "$name" "$tag"

  build:
    needs: meta
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - { runner: ubuntu-latest,   arch: amd64 }
          - { runner: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (native ${{ matrix.arch }})
        run: cargo build --release --manifest-path "${{ needs.meta.outputs.name }}/Cargo.toml"
      - name: Package
        id: pkg
        run: |
          name="${{ needs.meta.outputs.name }}"
          version="${{ needs.meta.outputs.version }}"
          arch="${{ matrix.arch }}"
          tarball="${name}-${version}-linux-${arch}.tar.gz"
          mapfile -t bins < <(python3 ci/release.py bins "$name")
          tar -czf "$tarball" -C target/release "${bins[@]}"
          sha256sum "$tarball" > "${tarball}.sha256"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            ${{ steps.pkg.outputs.tarball }}
            ${{ steps.pkg.outputs.tarball }}.sha256
          retention-days: 1

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the release + commit index.json
    concurrency: index-commit   # serialize index.json commits across releases
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main             # we commit the updated index back to main
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate published manifest
        run: |
          name="${{ needs.meta.outputs.name }}"
          version="${{ needs.meta.outputs.version }}"
          python3 ci/release.py manifest "$name" "${GITHUB_REF_NAME}" \
            "dist/${name}-${version}-linux-amd64.tar.gz" \
            "dist/${name}-${version}-linux-arm64.tar.gz" \
            "dist/loadsmith-plugin.yaml"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${{ needs.meta.outputs.name }} v${{ needs.meta.outputs.version }}" \
            --notes "Loadsmith plugin \`${{ needs.meta.outputs.name }}\` v${{ needs.meta.outputs.version }} (linux amd64+arm64). Install: \`loadsmith install ${{ needs.meta.outputs.name }}\`." \
            dist/*.tar.gz dist/*.sha256 dist/loadsmith-plugin.yaml
      - name: Update index.json
        run: |
          name="${{ needs.meta.outputs.name }}"
          version="${{ needs.meta.outputs.version }}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/loadsmith-plugin.yaml"
          python3 ci/release.py index "$name" "$version" "$url" index.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "index: ${name} v${version}" || { echo "no index change"; exit 0; }
          git push origin HEAD:main
